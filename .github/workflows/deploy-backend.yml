name: Deploy Django Backend

on:
  push:
    branches:
      - main # Runs on pushes to main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml" # Also runs if this workflow is changed

permissions:
  contents: read

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.5
        env:
          PROJECT_DIR: ${{ vars.PROJECT_DIR }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          known_hosts: ${{ secrets.SERVER_KNOWN_HOSTS }}
          envs: PROJECT_DIR
          script: |
            # If something goes wrong, exit immediately
            set -e

            # Navigate to project directory
            cd "$PROJECT_DIR"

            # Pull changes
            git pull origin main

            # Navigate to backend directory
            cd backend

            # Activate virtual environment
            source .venv/bin/activate

            # Install dependencies
            pip install -r requirements.txt

            # Run database migrations
            python manage.py migrate

            # Restart API and Celery workers
            pm2 reload ecosystem.config.js
